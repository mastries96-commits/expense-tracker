<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0F172A 0%, #1E3A5F 50%, #0F172A 100%);
    }
    .login-card {
      background: #fff;
      border-radius: 22px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 390px;
      box-shadow: 0 24px 64px rgba(0,0,0,.38);
    }
    .logo-wrap {
      width: 60px; height: 60px;
      border-radius: 18px;
      background: linear-gradient(135deg, #3B82F6, #6366F1);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 22px;
      font-size: 1.6rem; color: #fff;
      box-shadow: 0 8px 20px rgba(99,102,241,.35);
    }
    .login-title {
      font-size: 1.45rem; font-weight: 800;
      color: #1E293B; text-align: center; margin: 0 0 4px;
    }
    .login-sub {
      font-size: .84rem; color: #64748B;
      text-align: center; margin: 0 0 28px;
    }
    .field-label {
      font-size: .78rem; font-weight: 700;
      color: #475569; text-transform: uppercase;
      letter-spacing: .05em;
      display: block; margin-bottom: 7px;
    }
    .pw-wrap { position: relative; }
    .pw-input {
      width: 100%;
      padding: 13px 46px 13px 16px;
      border: 1.5px solid #E2E8F0;
      border-radius: 11px;
      font-size: .92rem;
      font-family: 'Inter', sans-serif;
      color: #1E293B;
      background: #F8FAFC;
      outline: none;
      transition: border-color .15s, background .15s;
    }
    .pw-input:focus {
      border-color: #3B82F6;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(59,130,246,.12);
    }
    .pw-eye {
      position: absolute; right: 13px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; padding: 0;
      color: #94A3B8; font-size: .9rem; cursor: pointer;
      transition: color .15s;
    }
    .pw-eye:hover { color: #3B82F6; }
    .login-btn {
      width: 100%; margin-top: 18px;
      padding: 13px;
      background: linear-gradient(135deg, #3B82F6, #6366F1);
      border: none; border-radius: 11px;
      color: #fff; font-size: .95rem; font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: opacity .15s, transform .15s;
      letter-spacing: .01em;
    }
    .login-btn:hover { opacity: .92; transform: translateY(-1px); }
    .login-btn:active { transform: translateY(0); opacity: 1; }
    .error-box {
      display: flex; align-items: center; gap: 10px;
      background: #FEF2F2; border: 1px solid #FECACA;
      color: #DC2626; border-radius: 10px;
      padding: 11px 14px; font-size: .83rem;
      margin-bottom: 18px;
    }
    .footer-note {
      text-align: center; margin-top: 22px;
      font-size: .75rem; color: #94A3B8;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-wrap">
      <i class="fa-solid fa-wallet"></i>
    </div>
    <h1 class="login-title">Expense Tracker</h1>
    <p class="login-sub">Enter your password to access the dashboard</p>

    {% if error %}
    <div class="error-box">
      <i class="fa-solid fa-circle-exclamation"></i>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/login" autocomplete="off">
      <label class="field-label" for="pw-input">Password</label>
      <div class="pw-wrap">
        <input
          class="pw-input"
          type="password"
          name="password"
          id="pw-input"
          placeholder="Enter password"
          autofocus
          autocomplete="current-password"
        />
        <button type="button" class="pw-eye" onclick="togglePw()" tabindex="-1">
          <i class="fa-solid fa-eye" id="pw-eye-icon"></i>
        </button>
      </div>
      <button type="submit" class="login-btn">
        <i class="fa-solid fa-arrow-right-to-bracket me-2"></i>Login
      </button>
    </form>

    <div class="footer-note">Expense Tracker &mdash; Personal Finance Dashboard</div>
  </div>

  <script>
    function togglePw() {
      const inp = document.getElementById('pw-input');
      const ico = document.getElementById('pw-eye-icon');
      if (inp.type === 'password') {
        inp.type = 'text';
        ico.className = 'fa-solid fa-eye-slash';
      } else {
        inp.type = 'password';
        ico.className = 'fa-solid fa-eye';
      }
    }
    document.getElementById('pw-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') e.currentTarget.form.submit();
    });
  </script>
</body>
</html>
