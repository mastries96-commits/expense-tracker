<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0D1117;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 30%, rgba(0,201,167,.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 35% at 80% 70%, rgba(88,166,255,.06) 0%, transparent 70%);
      pointer-events: none;
    }
    .login-card {
      position: relative;
      background: #161B22;
      border: 1px solid #21262D;
      border-radius: 16px;
      padding: 44px 40px 38px;
      width: 100%;
      max-width: 390px;
      box-shadow: 0 24px 64px rgba(0,0,0,.6);
    }
    .logo-wrap {
      width: 56px; height: 56px;
      border-radius: 14px;
      background: rgba(0,201,167,.12);
      border: 1px solid rgba(0,201,167,.25);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 1.5rem; color: #00C9A7;
    }
    .login-title {
      font-size: 1.35rem; font-weight: 700;
      color: #C9D1D9; text-align: center; margin: 0 0 4px;
      letter-spacing: -.01em;
    }
    .login-sub {
      font-size: .82rem; color: #8B949E;
      text-align: center; margin: 0 0 28px;
    }
    .field-label {
      font-size: .72rem; font-weight: 700;
      color: #8B949E; text-transform: uppercase;
      letter-spacing: .06em;
      display: block; margin-bottom: 7px;
    }
    .pw-wrap { position: relative; }
    .pw-input {
      width: 100%;
      padding: 12px 46px 12px 14px;
      border: 1px solid #21262D;
      border-radius: 9px;
      font-size: .9rem;
      font-family: 'Inter', sans-serif;
      color: #C9D1D9;
      background: #0D1117;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .pw-input:focus {
      border-color: #00C9A7;
      box-shadow: 0 0 0 3px rgba(0,201,167,.12);
    }
    .pw-input::placeholder { color: #484F58; }
    .pw-eye {
      position: absolute; right: 13px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; padding: 0;
      color: #484F58; font-size: .9rem; cursor: pointer;
      transition: color .15s;
    }
    .pw-eye:hover { color: #00C9A7; }
    .login-btn {
      width: 100%; margin-top: 20px;
      padding: 13px;
      background: #00C9A7;
      border: none; border-radius: 9px;
      color: #0D1117; font-size: .92rem; font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background .15s, transform .15s, box-shadow .15s;
      letter-spacing: .01em;
    }
    .login-btn:hover {
      background: #00E5BF;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,201,167,.3);
    }
    .login-btn:active { transform: translateY(0); box-shadow: none; }
    .error-box {
      display: flex; align-items: center; gap: 10px;
      background: rgba(248,81,73,.1); border: 1px solid rgba(248,81,73,.3);
      color: #F85149; border-radius: 9px;
      padding: 11px 14px; font-size: .82rem;
      margin-bottom: 18px;
    }
    .footer-note {
      text-align: center; margin-top: 22px;
      font-size: .72rem; color: #484F58;
      letter-spacing: .03em;
    }
    .divider {
      height: 1px; background: #21262D; margin: 0 0 24px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-wrap">
      <i class="fa-solid fa-wallet"></i>
    </div>
    <h1 class="login-title">Expense Tracker</h1>
    <p class="login-sub">Sign in to access the dashboard</p>

    {% if error %}
    <div class="error-box">
      <i class="fa-solid fa-circle-exclamation"></i>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/login" autocomplete="off">
      <div style="margin-bottom:16px;">
        <label class="field-label" for="username-input">Username</label>
        <input
          class="pw-input"
          type="text"
          name="username"
          id="username-input"
          placeholder="Enter username"
          autofocus
          autocomplete="username"
        />
      </div>
      <label class="field-label" for="pw-input">Password</label>
      <div class="pw-wrap">
        <input
          class="pw-input"
          type="password"
          name="password"
          id="pw-input"
          placeholder="Enter password"
          autocomplete="current-password"
        />
        <button type="button" class="pw-eye" onclick="togglePw()" tabindex="-1">
          <i class="fa-solid fa-eye" id="pw-eye-icon"></i>
        </button>
      </div>
      <button type="submit" class="login-btn">
        <i class="fa-solid fa-arrow-right-to-bracket me-2"></i>Login
      </button>
    </form>

    <div class="footer-note">Expense Tracker &mdash; Personal Finance Dashboard</div>
  </div>

  <script>
    function togglePw() {
      const inp = document.getElementById('pw-input');
      const ico = document.getElementById('pw-eye-icon');
      if (inp.type === 'password') {
        inp.type = 'text';
        ico.className = 'fa-solid fa-eye-slash';
      } else {
        inp.type = 'password';
        ico.className = 'fa-solid fa-eye';
      }
    }
    document.getElementById('pw-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') e.currentTarget.form.submit();
    });
  </script>
</body>
</html>
